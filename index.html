<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verkyanas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="asset/favicon/favicon.ico">
</head>
<body oncontextmenu="return false;">

  <!-- Background Video -->
  <div id="bg-video-wrap">
    <video id="bg-video" autoplay muted loop playsinline
      src="https://fern.wtf/assets/roll/yes.mp4">
    </video>
    <div id="bg-overlay"></div>
  </div>

  <!-- Background Audio — swap music.mp3 with your own file -->
  <audio id="bg-music" loop>  
    <source src="asset/bgm.mp3" type="audio/mpeg">
  </audio>

  <!-- Splash Screen -->
  <div id="splash">
    <div id="enter-world">
      <span class="asterisk">*&gt;</span>
      <span class="enter-text">Enter World</span>
      <span class="asterisk">&lt;*</span>
    </div>
    <p class="deco">— ✦ —</p>
  </div>

  <!-- Main Site -->
  <div id="site">

    <nav>
      <a href="#" class="active">Home</a>
      <a href="projects.html">Projects</a>
      <a href="https://discord.com/users/932465298248966195" target="_blank">Contact</a>
      <a href="#" target="_blank">Donate</a>
    </nav>

    <main class="hero">

      <!-- ╔══════════════════════════════════════╗ -->
      <!-- ║           INTRO CARD                 ║ -->
      <!-- ╚══════════════════════════════════════╝ -->
      <div class="intro-card">

        <!-- Profile picture — swap profile.png with your own PNG -->
        <div class="avatar-wrap">
          <img src="asset/me.jpg" alt="Profile picture" class="avatar" />
        </div>

        <!-- Greeting -->
        <h1 class="hello">Hello World!</h1>

        <!-- Typewriter line — edit the data-words list to customise your phrases -->
        <p class="typewriter-line">
          <span id="typewriter"></span><span class="caret">|</span>
        </p>

      </div>

    </main>

    <footer>
      <span>VV <span class="dot">✦</span> is-a.dev</span>
      <span>&copy; 2024 Verkyana</span>
    </footer>

  </div>

  <!--
    ┌─────────────────────────────────────────┐
    │  TYPEWRITER WORDS — edit this list!     │
    │  Each phrase will cycle automatically.  │
    └─────────────────────────────────────────┘
  -->
  <script>
    const typewriterWords = [
      "hi, i'm ian.",  // edit this to your name or a greeting
      "AMD Radeon 7 8845HS, 16GB RAM, 1TB SSD.",  // edit this to your specs or setup
      "i'm a developer",
      // add or remove phrases here ↑
    ];
  </script>

  <script src="script.js"></script>
</body>
</html>
